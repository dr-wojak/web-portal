<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPERPLT — Style Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #070707;
    --bg1:     #101010;
    --bg2:     #191919;
    --bg3:     #222222;
    --border:  #2c2c2c;
    --text:    #f0ece3;
    --text2:   #9a9590;
    --text3:   #555;
    --accent:  #b8ff4a;
    --accenth: #d0ff7c;
    --accentd: #7ab830;
    --err:     #ff5252;
    --warn:    #ffb347;
    --ok:      #4aff9e;
    --r: 14px;
    --rs: 8px;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Layout ────────────────────────────────── */
  .wrap { max-width: 960px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Header ────────────────────────────────── */
  header {
    padding: 52px 0 44px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .logo-mark {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    padding: 8px;
    flex-shrink: 0;
  }
  .logo-mark span {
    border-radius: 3px;
    background: #000;
  }
  .logo-mark span:nth-child(2) { background: #333; }
  .logo-mark span:nth-child(3) { background: #555; }
  .logo-mark span:nth-child(4) { background: #888; }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  header h1 span { color: var(--accent); }
  .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* ── Input Panel ───────────────────────────── */
  .input-panel {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    margin-bottom: 32px;
  }
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 14px 22px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color .15s, border-color .15s;
    letter-spacing: 0.02em;
  }
  .tab-btn.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  .tab-pane { display: none; padding: 20px; }
  .tab-pane.active { display: block; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    display: block;
    margin-bottom: 8px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .url-row { display: flex; gap: 10px; }
  .url-row input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 11px 14px;
    outline: none;
    transition: border-color .15s;
  }
  .url-row input:focus { border-color: var(--accent); }
  .url-row input::placeholder { color: var(--text3); }
  textarea {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    padding: 12px 14px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }
  .hint { font-size: 12px; color: var(--text3); margin-top: 10px; font-family: 'IBM Plex Mono', monospace; }

  /* ── Buttons ───────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    border-radius: 40px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s, transform .1s, opacity .15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accenth); }
  .btn-primary:disabled { opacity: .4; cursor: default; }
  .btn-sm {
    padding: 7px 14px;
    font-size: 12px;
    border-radius: 20px;
  }
  .btn-ghost {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg3); }

  /* ── Status / Loading ─────────────────────── */
  #status {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-radius: var(--rs);
    background: var(--bg1);
    border: 1px solid var(--border);
    margin-bottom: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  #status.show { display: flex; }
  #status.err { border-color: var(--err); color: var(--err); }
  #status.ok { border-color: var(--ok); color: var(--ok); }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results Container ─────────────────────── */
  #results { display: none; }
  #results.show { display: block; }

  /* ── Summary Card ──────────────────────────── */
  .summary-card {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 24px 28px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: start;
  }
  .summary-card h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .aesthetic-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--accent);
    border: 1px solid var(--accentd);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .summary-text { font-size: 14px; color: var(--text2); line-height: 1.6; }
  .palette-strip {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .palette-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.08);
    cursor: pointer;
    transition: transform .15s;
  }
  .palette-dot:hover { transform: scale(1.2); }

  /* ── Result Tabs ───────────────────────────── */
  .result-tabs {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .result-tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .result-tab-bar::-webkit-scrollbar { display: none; }
  .result-tab-btn {
    padding: 13px 18px;
    background: none;
    border: none;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .15s;
    white-space: nowrap;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .result-tab-btn .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    background: var(--bg3);
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 400;
  }
  .result-tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .result-tab-btn:hover:not(.active) { color: var(--text); }
  .result-tab-pane { display: none; padding: 24px; }
  .result-tab-pane.active { display: block; }

  /* ── Colors Tab ────────────────────────────── */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .color-card {
    border-radius: var(--rs);
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .color-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .color-swatch { height: 90px; position: relative; }
  .copy-hint {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-family: 'IBM Plex Mono', monospace;
    opacity: 0; transition: opacity .15s;
    font-weight: 500;
  }
  .color-card:hover .copy-hint { opacity: 1; }
  .color-meta {
    padding: 10px 12px;
    background: var(--bg2);
  }
  .color-hex {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .color-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .color-usage { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .role-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 6px;
  }

  /* ── Typography Tab ────────────────────────── */
  .font-card {
    border: 1px solid var(--border);
    border-radius: var(--rs);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .font-specimen {
    padding: 28px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    min-height: 90px;
    display: flex;
    align-items: center;
  }
  .font-meta {
    padding: 14px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
  }
  .font-name { font-size: 15px; font-weight: 700; }
  .font-detail {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
  }
  .font-detail strong { color: var(--text); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 9px;
    background: var(--bg3);
    border-radius: 4px;
    color: var(--text2);
  }

  /* ── Spacing Tab ───────────────────────────── */
  .spacing-grid { display: flex; flex-direction: column; gap: 10px; }
  .spacing-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .spacing-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    width: 64px;
    text-align: right;
    flex-shrink: 0;
  }
  .spacing-bar-wrap {
    flex: 1;
    height: 28px;
    background: var(--bg2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .spacing-bar {
    height: 100%;
    background: var(--accent);
    opacity: .5;
    border-radius: 4px;
    transition: width .5s ease;
  }
  .spacing-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-top: 16px;
  }

  /* ── Variables Tab ─────────────────────────── */
  .var-list { display: flex; flex-direction: column; gap: 6px; }
  .var-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg2);
    border-radius: var(--rs);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s;
  }
  .var-row:hover { background: var(--bg3); }
  .var-swatch {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,.1);
    flex-shrink: 0;
  }
  .var-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    flex: 1;
  }
  .var-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }
  .var-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--bg3);
    color: var(--text3);
    text-transform: uppercase;
  }

  /* ── Components Tab ────────────────────────── */
  .comp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  .comp-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    padding: 16px 18px;
  }
  .comp-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .comp-desc { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
  .comp-styles {
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    line-height: 1.8;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .comp-styles .k { color: #7ec8e3; }
  .comp-styles .v { color: #c8b97e; }

  /* ── Themes Tab ────────────────────────────── */
  .themes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .theme-card {
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .theme-preview {
    height: 120px;
    padding: 16px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .theme-fake-text {
    height: 10px;
    border-radius: 5px;
    opacity: .7;
  }
  .theme-fake-btn {
    height: 28px;
    width: 80px;
    border-radius: 6px;
    margin-top: 4px;
  }
  .theme-info {
    padding: 14px 16px;
    background: var(--bg2);
  }
  .theme-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .theme-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .theme-swatches { display: flex; gap: 6px; }
  .theme-swatch {
    flex: 1;
    height: 20px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,.06);
  }

  /* ── Export Panel ──────────────────────────── */
  .export-panel {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px 24px;
    margin-top: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .export-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    margin-right: 4px;
  }

  /* ── Copy Toast ────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 40px;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Empty / Error States ──────────────────── */
  .empty {
    padding: 32px;
    text-align: center;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  /* ── Section header ────────────────────────── */
  .section-hd {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Responsive ────────────────────────────── */
  @media (max-width: 620px) {
    header { padding: 32px 0 28px; }
    .color-grid { grid-template-columns: 1fr 1fr; }
    .summary-card { grid-template-columns: 1fr; }
    .palette-strip { justify-content: flex-start; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- ── Header ── -->
  <header>
    <div class="logo-mark">
      <span></span><span></span><span></span><span></span>
    </div>
    <div>
      <h1>SUPER<span>PLT</span></h1>
      <div class="tagline">AI-powered design system extractor</div>
    </div>
  </header>

  <!-- ── Input Panel ── -->
  <div class="input-panel">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="url">↗ From URL</button>
      <button class="tab-btn" data-tab="paste">⌥ Paste HTML / CSS</button>
    </div>

    <div class="tab-pane active" id="tab-url">
      <label class="field-label">Website URL</label>
      <div class="url-row">
        <input type="url" id="url-input" placeholder="https://stripe.com" autocomplete="off" spellcheck="false">
        <button class="btn btn-primary" id="analyze-url-btn">Analyze ↗</button>
      </div>
      <p class="hint">Fetches the page HTML via a CORS proxy, then extracts the full design system with AI.</p>
    </div>

    <div class="tab-pane" id="tab-paste">
      <label class="field-label">Paste HTML, CSS, or both</label>
      <textarea id="paste-input" placeholder="Paste your HTML source, <style> blocks, or raw CSS here…"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:10px;">
        <button class="btn btn-primary" id="analyze-paste-btn">Analyze ↗</button>
      </div>
    </div>
  </div>

  <!-- ── Status ── -->
  <div id="status">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">Initializing…</span>
  </div>

  <!-- ── Results ── -->
  <div id="results">
    <div class="summary-card">
      <div>
        <div class="aesthetic-badge" id="res-aesthetic"></div>
        <h2 id="res-site-name"></h2>
        <p class="summary-text" id="res-summary"></p>
      </div>
      <div class="palette-strip" id="res-palette-strip"></div>
    </div>

    <div class="result-tabs">
      <div class="result-tab-bar">
        <button class="result-tab-btn active" data-rtab="colors">Colors <span class="badge" id="badge-colors"></span></button>
        <button class="result-tab-btn" data-rtab="typography">Typography <span class="badge" id="badge-typo"></span></button>
        <button class="result-tab-btn" data-rtab="spacing">Spacing</button>
        <button class="result-tab-btn" data-rtab="variables">Variables <span class="badge" id="badge-vars"></span></button>
        <button class="result-tab-btn" data-rtab="components">Components <span class="badge" id="badge-comps"></span></button>
        <button class="result-tab-btn" data-rtab="themes">Themes <span class="badge" id="badge-themes"></span></button>
      </div>

      <div class="result-tab-pane active" id="rtab-colors">
        <div class="section-hd">Extracted Colors</div>
        <div class="color-grid" id="color-grid"></div>
      </div>
      <div class="result-tab-pane" id="rtab-typography">
        <div class="section-hd">Typography System</div>
        <div id="typo-list"></div>
      </div>
      <div class="result-tab-pane" id="rtab-spacing">
        <div class="section-hd">Spacing Scale</div>
        <div class="spacing-grid" id="spacing-grid"></div>
        <p class="spacing-note" id="spacing-note"></p>
      </div>
      <div class="result-tab-pane" id="rtab-variables">
        <div class="section-hd">CSS Custom Properties</div>
        <div class="var-list" id="var-list"></div>
      </div>
      <div class="result-tab-pane" id="rtab-components">
        <div class="section-hd">Components & Patterns</div>
        <div class="comp-grid" id="comp-grid"></div>
      </div>
      <div class="result-tab-pane" id="rtab-themes">
        <div class="section-hd">Themes</div>
        <div class="themes-grid" id="themes-grid"></div>
      </div>
    </div>

    <!-- ── Export ── -->
    <div class="export-panel">
      <span class="export-label">Export →</span>
      <button class="btn btn-ghost btn-sm" id="export-css">Copy CSS Variables</button>
      <button class="btn btn-ghost btn-sm" id="export-json">Copy JSON Tokens</button>
      <button class="btn btn-ghost btn-sm" id="export-tailwind">Copy Tailwind Config</button>
      <button class="btn btn-ghost btn-sm" id="export-figma">Copy Figma Palette</button>
    </div>
  </div>

</div>

<div id="toast">Copied!</div>

<script>
// ── State ──────────────────────────────────────────────────────────
let designSystem = null;

// ── Helpers ────────────────────────────────────────────────────────
function normalizeHex(color) {
  if (!color || typeof color !== 'string') return '#888888';
  color = color.trim();
  if (color.startsWith('#')) {
    if (color.length === 4) {
      return '#' + color[1]+color[1]+color[2]+color[2]+color[3]+color[3];
    }
    return '#' + color.slice(1,7).toLowerCase().padEnd(6,'0');
  }
  const rgbM = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (rgbM) {
    return '#' + [rgbM[1],rgbM[2],rgbM[3]]
      .map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
  }
  return '#888888';
}

function luminance(hex) {
  hex = normalizeHex(hex);
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const lin = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*lin(r) + 0.7152*lin(g) + 0.0722*lin(b);
}

function textOn(hex) {
  return luminance(hex) > 0.35 ? '#000000' : '#ffffff';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied!');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setStatus(msg, type='loading') {
  const el = document.getElementById('status');
  const txt = document.getElementById('status-text');
  const sp = document.getElementById('spinner');
  el.className = 'show';
  if (type === 'err') { el.classList.add('err'); sp.style.display='none'; }
  else if (type === 'ok') { el.classList.add('ok'); sp.style.display='none'; }
  else { sp.style.display='block'; }
  txt.textContent = msg;
}
function hideStatus() {
  document.getElementById('status').className = '';
}

function parseSize(s) {
  if (!s) return 0;
  return parseFloat(s) || 0;
}

// ── HTML Preprocessing ─────────────────────────────────────────────
function preprocessHtml(html) {
  // Strip script content but keep tags
  html = html.replace(/<script\b[^>]*>[\s\S]*?<\/script>/gi, '');
  // Strip HTML comments
  html = html.replace(/<!--[\s\S]*?-->/g, '');
  // Trim whitespace runs
  html = html.replace(/\s{3,}/g, ' ');
  // Truncate to 80k chars
  return html.substring(0, 80000);
}

// ── CORS Proxy Fetch ───────────────────────────────────────────────
async function fetchViaProxy(url) {
  const proxies = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
  ];
  for (const proxy of proxies) {
    try {
      const ctrl = new AbortController();
      const tid = setTimeout(() => ctrl.abort(), 18000);
      const res = await fetch(proxy, { signal: ctrl.signal });
      clearTimeout(tid);
      if (res.ok) {
        const txt = await res.text();
        if (txt && txt.length > 300) return txt;
      }
    } catch(e) { /* try next */ }
  }
  return null;
}

// ── Claude API ─────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are a world-class design system analyst. Extract every design token from the provided HTML/CSS source.

Return ONLY a valid JSON object — no markdown, no code fences, no explanation. Use this exact structure:

{
  "siteName": "detected site name",
  "aesthetic": "2-3 word aesthetic description (e.g. 'minimal corporate', 'bold playful', 'dark technical')",
  "summary": "2-3 sentences describing the overall design style and approach.",
  "colors": [
    {
      "hex": "#rrggbb (must be 6-digit lowercase hex)",
      "name": "Descriptive name like 'Ocean Blue' or 'Warm Cream'",
      "usage": "Where this color is used (e.g. 'primary buttons, links, headlines')",
      "role": "primary|secondary|accent|background|surface|text|border|error|success|warning|other",
      "frequency": "high|medium|low"
    }
  ],
  "typography": [
    {
      "family": "exact font-family string",
      "role": "display|heading|body|caption|code|label|other",
      "sizes": ["array of size values found"],
      "weights": ["array of weight values found"],
      "lineHeights": [],
      "letterSpacing": "",
      "specimen": "A sentence to showcase this font's character"
    }
  ],
  "spacing": {
    "unit": "px|rem|em|mixed",
    "baseUnit": "base spacing unit if detectable",
    "scale": ["ordered smallest-to-largest spacing values found"],
    "notes": "description of spacing pattern"
  },
  "cssVariables": [
    {
      "name": "--variable-name",
      "value": "its value",
      "type": "color|size|font|animation|other",
      "description": "what it's for"
    }
  ],
  "components": [
    {
      "name": "Component Name",
      "description": "visual description",
      "keyStyles": { "css-property": "value" },
      "variants": ["variant1", "variant2"]
    }
  ],
  "themes": [
    {
      "name": "Theme name e.g. Light Mode or Dark Mode",
      "description": "theme description",
      "background": "#hex",
      "surface": "#hex",
      "text": "#hex",
      "textMuted": "#hex",
      "accent": "#hex",
      "border": "#hex",
      "palette": ["#hex1","#hex2","#hex3","#hex4","#hex5","#hex6"]
    }
  ]
}

Be exhaustive. Extract every color, font, spacing value you can find. Normalize all hex to 6-digit lowercase. Empty array [] for sections with no data.`;

async function callClaude(content, isUrl) {
  const userMsg = isUrl
    ? `Analyze the design system of this website (URL: ${content.url}).\n\nHere is the fetched HTML source:\n\n${content.html}`
    : `Analyze this HTML/CSS source and extract the complete design system:\n\n${content}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: userMsg }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${resp.status}`);
  }

  const data = await resp.json();
  const raw = (data.content || [])
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');

  return parseDesignSystem(raw);
}

function parseDesignSystem(text) {
  // Try raw JSON
  try { return JSON.parse(text.trim()); } catch {}
  // Strip code fences
  const fenceM = text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fenceM) { try { return JSON.parse(fenceM[1].trim()); } catch {} }
  // Find first JSON object
  const objM = text.match(/\{[\s\S]*\}/);
  if (objM) { try { return JSON.parse(objM[0]); } catch {} }
  throw new Error('Could not parse design system from API response.');
}

// ── Main Analyze Function ──────────────────────────────────────────
async function analyze(mode) {
  const analyzeUrlBtn = document.getElementById('analyze-url-btn');
  const analyzePasteBtn = document.getElementById('analyze-paste-btn');
  analyzeUrlBtn.disabled = true;
  analyzePasteBtn.disabled = true;
  document.getElementById('results').classList.remove('show');

  try {
    let content, isUrl = false;

    if (mode === 'url') {
      const url = document.getElementById('url-input').value.trim();
      if (!url) { setStatus('Please enter a URL.', 'err'); return; }
      setStatus('Fetching page via CORS proxy…');
      const html = await fetchViaProxy(url);
      if (!html) {
        setStatus('Could not fetch the URL (CORS blocked or unreachable). Try the Paste HTML tab instead.', 'err');
        return;
      }
      content = { url, html: preprocessHtml(html) };
      isUrl = true;
    } else {
      content = document.getElementById('paste-input').value.trim();
      if (!content) { setStatus('Please paste some HTML or CSS.', 'err'); return; }
      content = preprocessHtml(content);
    }

    setStatus('Extracting design system with AI…');
    designSystem = await callClaude(content, isUrl);

    hideStatus();
    renderResults(designSystem);
    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(e) {
    setStatus('Error: ' + e.message, 'err');
  } finally {
    analyzeUrlBtn.disabled = false;
    analyzePasteBtn.disabled = false;
  }
}

// ── Render Results ─────────────────────────────────────────────────
function renderResults(ds) {
  // Summary
  document.getElementById('res-site-name').textContent = ds.siteName || 'Design System';
  document.getElementById('res-aesthetic').textContent = ds.aesthetic || 'extracted';
  document.getElementById('res-summary').textContent = ds.summary || '';

  // Palette strip (top 8 colors)
  const strip = document.getElementById('res-palette-strip');
  strip.innerHTML = '';
  const topColors = (ds.colors || []).slice(0, 10);
  topColors.forEach(c => {
    const hex = normalizeHex(c.hex);
    const d = document.createElement('div');
    d.className = 'palette-dot';
    d.style.background = hex;
    d.title = `${c.name || ''} ${hex}`;
    d.onclick = () => copyText(hex);
    strip.appendChild(d);
  });

  renderColors(ds.colors || []);
  renderTypography(ds.typography || []);
  renderSpacing(ds.spacing || {});
  renderVariables(ds.cssVariables || []);
  renderComponents(ds.components || []);
  renderThemes(ds.themes || []);

  // Update badges
  document.getElementById('badge-colors').textContent = (ds.colors||[]).length;
  document.getElementById('badge-typo').textContent = (ds.typography||[]).length;
  document.getElementById('badge-vars').textContent = (ds.cssVariables||[]).length;
  document.getElementById('badge-comps').textContent = (ds.components||[]).length;
  document.getElementById('badge-themes').textContent = (ds.themes||[]).length;
}

function renderColors(colors) {
  const grid = document.getElementById('color-grid');
  if (!colors.length) { grid.innerHTML = '<div class="empty">No colors extracted.</div>'; return; }
  grid.innerHTML = colors.map(c => {
    const hex = normalizeHex(c.hex);
    const fg = textOn(hex);
    return `
    <div class="color-card" onclick="copyText('${hex}')">
      <div class="color-swatch" style="background:${hex}">
        <div class="copy-hint" style="color:${fg}">Copy ${hex}</div>
      </div>
      <div class="color-meta">
        <div class="color-hex">${hex}</div>
        <div class="color-name">${c.name || ''}</div>
        <div class="color-usage">${c.usage || ''}</div>
        ${c.role ? `<span class="role-badge">${c.role}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderTypography(fonts) {
  const list = document.getElementById('typo-list');
  if (!fonts.length) { list.innerHTML = '<div class="empty">No typography data extracted.</div>'; return; }
  list.innerHTML = fonts.map(f => {
    const sizes = (f.sizes||[]).join(', ') || '—';
    const weights = (f.weights||[]).join(', ') || '—';
    const specimen = f.specimen || 'The quick brown fox jumps over the lazy dog.';
    const specimenSize = f.sizes && f.sizes[0] ? Math.min(parseSize(f.sizes[0]), 42) : 24;
    const specimenWeight = f.weights && f.weights[0] ? f.weights[0] : 400;
    const safeFamily = (f.family || 'inherit').replace(/"/g, "'");
    return `
    <div class="font-card">
      <div class="font-specimen">
        <span style="font-family:'${safeFamily}',sans-serif;font-size:${specimenSize}px;font-weight:${specimenWeight};line-height:1.25;color:#f0ece3">
          ${specimen}
        </span>
      </div>
      <div class="font-meta">
        <div>
          <div class="font-name">${f.family || 'Unknown'}</div>
          <div style="display:flex;gap:20px;margin-top:8px;flex-wrap:wrap">
            <span class="font-detail"><strong>Role</strong> ${f.role||'—'}</span>
            <span class="font-detail"><strong>Sizes</strong> ${sizes}</span>
            <span class="font-detail"><strong>Weights</strong> ${weights}</span>
            ${f.lineHeights&&f.lineHeights.length ? `<span class="font-detail"><strong>Line-height</strong> ${f.lineHeights.join(', ')}</span>` : ''}
            ${f.letterSpacing ? `<span class="font-detail"><strong>Letter-spacing</strong> ${f.letterSpacing}</span>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSpacing(sp) {
  const grid = document.getElementById('spacing-grid');
  const note = document.getElementById('spacing-note');
  const scale = sp.scale || [];
  if (!scale.length) { grid.innerHTML = '<div class="empty">No spacing data extracted.</div>'; return; }
  const max = Math.max(...scale.map(s => parseSize(s)), 1);
  grid.innerHTML = scale.map(s => {
    const px = parseSize(s);
    const pct = Math.min((px / max) * 100, 100);
    return `
    <div class="spacing-row">
      <div class="spacing-label">${s}</div>
      <div class="spacing-bar-wrap">
        <div class="spacing-bar" style="width:${pct}%"></div>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);width:40px">${px}px</div>
    </div>`;
  }).join('');
  note.textContent = [sp.notes, sp.baseUnit ? `Base unit: ${sp.baseUnit}` : ''].filter(Boolean).join(' · ');
}

function renderVariables(vars) {
  const list = document.getElementById('var-list');
  if (!vars.length) { list.innerHTML = '<div class="empty">No CSS variables found.</div>'; return; }
  list.innerHTML = vars.map(v => {
    const isColor = v.type === 'color' || /^#[0-9a-f]{3,8}$/i.test((v.value||'').trim());
    const hex = isColor ? normalizeHex(v.value) : null;
    return `
    <div class="var-row" onclick="copyText('${(v.name||'').replace(/'/g,"\\'")}:${(v.value||'').replace(/'/g,"\\'")}')">
      ${hex ? `<div class="var-swatch" style="background:${hex}"></div>` : `<div style="width:20px;height:20px;flex-shrink:0"></div>`}
      <div class="var-name">${v.name || ''}</div>
      <div class="var-value">${v.value || ''}</div>
      <div class="var-type">${v.type || 'other'}</div>
    </div>`;
  }).join('');
}

function renderComponents(comps) {
  const grid = document.getElementById('comp-grid');
  if (!comps.length) { grid.innerHTML = '<div class="empty">No components extracted.</div>'; return; }
  grid.innerHTML = comps.map(c => {
    const styles = c.keyStyles || {};
    const stylesHtml = Object.entries(styles).map(([k,v]) =>
      `<span class="k">${k}</span>: <span class="v">${v}</span>;\n`
    ).join('') || '—';
    const variants = (c.variants||[]).length
      ? `<div class="chips">${c.variants.map(v => `<span class="chip">${v}</span>`).join('')}</div>` : '';
    return `
    <div class="comp-card">
      <div class="comp-name">${c.name||'Component'}</div>
      <div class="comp-desc">${c.description||''}</div>
      <div class="comp-styles"><pre style="margin:0;white-space:pre-wrap;word-break:break-all">${stylesHtml}</pre></div>
      ${variants}
    </div>`;
  }).join('');
}

function renderThemes(themes) {
  const grid = document.getElementById('themes-grid');
  if (!themes.length) { grid.innerHTML = '<div class="empty">No themes extracted.</div>'; return; }
  grid.innerHTML = themes.map(t => {
    const bg = normalizeHex(t.background || '#ffffff');
    const txt = normalizeHex(t.text || (luminance(bg) > 0.5 ? '#000000' : '#ffffff'));
    const acc = normalizeHex(t.accent || '#0066ff');
    const palette = (t.palette || []).filter(Boolean).slice(0,8);
    return `
    <div class="theme-card">
      <div class="theme-preview" style="background:${bg}">
        <div class="theme-fake-text" style="background:${txt};width:70%"></div>
        <div class="theme-fake-text" style="background:${txt};opacity:.4;width:50%"></div>
        <div class="theme-fake-btn" style="background:${acc}"></div>
      </div>
      <div class="theme-info">
        <div class="theme-name">${t.name||'Theme'}</div>
        <div class="theme-desc">${t.description||''}</div>
        <div class="theme-swatches">
          ${palette.map(h => `<div class="theme-swatch" style="background:${normalizeHex(h)}" title="${h}"></div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Export Functions ────────────────────────────────────────────────
function exportCSS() {
  if (!designSystem) return;
  const lines = ['/* Design System — CSS Variables */\n:root {'];
  (designSystem.colors||[]).forEach(c => {
    const safe = (c.name||'color').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    lines.push(`  --color-${safe}: ${normalizeHex(c.hex)};`);
  });
  (designSystem.typography||[]).forEach(f => {
    const safe = (f.family||'font').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    lines.push(`  --font-${safe}: '${f.family}', sans-serif;`);
  });
  if (designSystem.spacing?.scale?.length) {
    designSystem.spacing.scale.forEach((s,i) => {
      lines.push(`  --space-${i+1}: ${s};`);
    });
  }
  (designSystem.cssVariables||[]).forEach(v => {
    if (v.name && v.value) lines.push(`  ${v.name}: ${v.value};`);
  });
  lines.push('}');
  copyText(lines.join('\n'));
}

function exportJSON() {
  if (!designSystem) return;
  copyText(JSON.stringify(designSystem, null, 2));
}

function exportTailwind() {
  if (!designSystem) return;
  const colors = {};
  (designSystem.colors||[]).forEach(c => {
    const safe = (c.name||'color').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
    colors[safe] = normalizeHex(c.hex);
  });
  const fonts = {};
  (designSystem.typography||[]).forEach(f => {
    const safe = (f.role||'body');
    fonts[safe] = [f.family, ...((f.family||'').includes('Mono') ? ['monospace'] : ['sans-serif'])];
  });
  const config = {
    theme: {
      extend: {
        colors,
        fontFamily: fonts,
      }
    }
  };
  copyText('// tailwind.config.js\nmodule.exports = ' + JSON.stringify(config, null, 2));
}

function exportFigma() {
  if (!designSystem) return;
  const lines = (designSystem.colors||[]).map(c =>
    `${c.name||'Color'}: ${normalizeHex(c.hex)}`
  );
  copyText(lines.join('\n'));
}

// ── Event Wiring ────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

document.querySelectorAll('.result-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.result-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.result-tab-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('rtab-' + btn.dataset.rtab).classList.add('active');
  });
});

document.getElementById('analyze-url-btn').addEventListener('click', () => analyze('url'));
document.getElementById('analyze-paste-btn').addEventListener('click', () => analyze('paste'));
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') analyze('url');
});

document.getElementById('export-css').addEventListener('click', exportCSS);
document.getElementById('export-json').addEventListener('click', exportJSON);
document.getElementById('export-tailwind').addEventListener('click', exportTailwind);
document.getElementById('export-figma').addEventListener('click', exportFigma);

// expose copyText globally for inline onclick
window.copyText = copyText;
</script>
</body>
</html>
